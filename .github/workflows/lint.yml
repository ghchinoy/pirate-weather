name: lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
